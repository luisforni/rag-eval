services:
  api:
    build: ./rag-eval-api
    ports:
      - "8000:8000"
    volumes:
      - ./rag-eval-api/data:/app/data
    env_file:
      - ./rag-eval-api/.env
    restart: unless-stopped

  ui:
    build: ./rag-eval-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
